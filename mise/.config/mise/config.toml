[plugins]
php = "https://github.com/verzly/mise-php#latest"

[alias]

[tools]
bun = "latest"
deno = "latest"
go = "latest"
node = "latest"
rust = "latest"
python = "3.14"
pipx = "latest"
pnpm = "latest"
php = "latest"
act = "latest"
bat = "latest"
direnv = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
ripgrep = "latest"
starship = "latest"
zoxide = "latest"
lsd = "latest"
yq = "latest"
minikube = "latest"
sops = "latest"
stern = "latest"
rtk = "latest"
mysql = "latest"
redis = "latest"
nub = "latest"
mago = "latest"
"cargo:phpantom_lsp" = "latest"
awscli = { version = "latest", symlink_bins = "true" }
kubectl = "latest"
awscli-local = { version = "latest", extras = "ver1" }
aws-vault = "latest"
colima = "latest"
lima = "latest"
docker-cli = "latest"
localstack = "latest"
pi = "latest"

[settings]
experimental = true

[env]
_.file = '.env'
_.path = [
    "{{config_root}}/node_modules/.bin",
    "{{config_root}}/vendor/bin",
]
_.php = { pie_extensions = "redis/phpredis xdebug/xdebug pecl/zip" }
