[plugins]
php = "https://github.com/verzly/mise-php#latest"

[alias]

[tools]
bun = "latest"
deno = "latest"
go = "latest"
node = "latest"
rust = "latest"
python = "latest"
pipx = "latest"
pnpm = "latest"
php = "latest"
act = "latest"
bat = "latest"
direnv = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
jq = "latest"
ripgrep = "latest"
starship = "latest"
zoxide = "latest"
lsd = "latest"
yq = "latest"
minikube = "latest"
sops = "latest"
stern = "latest"
