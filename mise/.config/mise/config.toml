[settings]
experimental = true

[env]
_.file = '.env'
_.path = [
    "{{config_root}}/node_modules/.bin",
    "{{config_root}}/vendor/bin",
]
_.php = { pie_extensions = "redis/phpredis xdebug/xdebug" }
